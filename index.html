<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couch Potato Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<header>
    <div class="logo">
        <img src="couchpotatoclub logo.png" alt="logo">
    </div>
    <nav>
        <a href="#">HOME</a>
        <a href="#">POTATO PICK</a>
        <a href="#">LIBRARY</a>
        <a href="#">ABOUT CPC</a>
    </nav>
</header>

<main>
    <section class="left">
        <h1 class="main-title">
            <span class="yellow">T</span><span class="blue">O</span><span class="yellow">D</span><span class="blue">A</span><span class="yellow">Y</span>
            <span class="blue">W</span><span class="yellow">E</span><span class="blue">'</span><span class="yellow">R</span><span class="blue">E</span>
            <br>
            <span class="yellow">W</span><span class="blue">A</span><span class="yellow">T</span><span class="blue">C</span><span class="yellow">H</span><span class="blue">I</span><span class="yellow">N</span><span class="blue">G</span><span class="yellow">.</span><span class="blue">.</span><span class="yellow">.</span>
        </h1>

        <div class="slot-box">
            <div class="slot-wrapper" id="slotWrapper"></div>
        </div>

        <div class="info-box" id="infoBox">
            <h2 class="info-title" id="infoTitle">드라마 제목</h2>
            <div class="info-stars">★★★★★</div>
            <p class="info-meta" id="infoMeta">0 seasons 00 ep</p>
            <ul class="info-tags">
                <li id="tag1">태그 1</li>
                <li id="tag2">태그 2</li>
                <li id="tag3">태그 3</li>
            </ul>
        </div>
    </section>

    <section class="right">
        <div class="wheel" id="wheel">
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
            <div class="poster"></div>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
